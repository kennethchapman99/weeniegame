<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>Cheddar &amp; Cocoa</title>
    <style>
      /* Zero external requests: no CDN fonts, all styling inline. */
      html,
      body {
        margin: 0;
        height: 100%;
        background: #14110d;
        overflow: hidden;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }
      #game {
        position: absolute;
        top: 0;
        left: 0;
        /* centered via JS (offX/offY) to match the prototype's letterbox math */
        image-rendering: auto;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
